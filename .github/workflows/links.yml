# Weekly broken-link check across the HTML pages and README.
name: Links

on:
  schedule:
    - cron: "0 7 * * 1" # Mondays, 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Check links
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          # Formspree rejects GET checks; LinkedIn returns a bot-blocking 999.
          args: "--no-progress --max-concurrency 4 --root-dir . --exclude '^https://formspree\\.io/f/xknkdzry$' --exclude '^https://www\\.linkedin\\.com/in/akash-ravi/?$' *.html README.md"
          fail: true
          jobSummary: true
