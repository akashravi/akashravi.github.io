# Quality gates: formatting, CSS/HTML linting, and Lighthouse budgets.
# Purely additive — never deploys, so it can't affect the live site.
name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build (Jekyll)
        run: bundle exec jekyll build

      - name: Prettier (check)
        run: npm run format:check

      - name: Stylelint
        run: npm run lint:css

      - name: HTMLHint (built output)
        run: npm run lint:html

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Build (Jekyll)
        run: bundle exec jekyll build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@512cc908a55bfb0ad231facca52adf3d3a651df4 # v12
        with:
          configPath: ./.lighthouserc.json
          temporaryPublicStorage: true
          uploadArtifacts: true
