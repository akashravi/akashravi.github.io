# Quality gates: formatting, CSS/HTML linting, and Lighthouse budgets.
# Purely additive — never deploys, so it can't affect the live site.
name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build (Jekyll)
        run: bundle exec jekyll build

      - name: Prettier (check)
        run: npm run format:check

      - name: Stylelint
        run: npm run lint:css

      - name: HTMLHint (built output)
        run: npm run lint:html

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build (Jekyll)
        run: bundle exec jekyll build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          temporaryPublicStorage: true
          uploadArtifacts: true
