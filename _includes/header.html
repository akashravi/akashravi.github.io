<header class="nav">
  <div class="wrap">
    <a class="brand" href="{% if page.home %}#top{% else %}/{% endif %}">Akash Ravi</a>
    <div class="nav-right">
      {%- if page.nav %}
      <button
        class="icon-btn nav-toggle"
        type="button"
        data-nav-toggle
        aria-controls="primary-navigation"
        aria-expanded="false"
        aria-label="Open navigation"
      >
        <svg class="icon menu" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 6h16" />
          <path d="M4 12h16" />
          <path d="M4 18h16" />
        </svg>
        <svg class="icon close" viewBox="0 0 24 24" aria-hidden="true">
          <path d="m18 6-12 12" />
          <path d="m6 6 12 12" />
        </svg>
      </button>
      <nav id="primary-navigation" class="nav-links" aria-label="Primary">
        <a href="#about">About</a>
        <a href="#resume">Résumé</a>
        <a href="#elsewhere">Elsewhere</a>
        <a href="#contact">Contact</a>
      </nav>
      {%- endif %}
      <button
        class="icon-btn theme-toggle"
        type="button"
        data-theme-toggle
        aria-label="Switch theme"
        aria-pressed="false"
      >
        <svg class="icon sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4" />
          <path d="M12 2v2" />
          <path d="M12 20v2" />
          <path d="m4.93 4.93 1.41 1.41" />
          <path d="m17.66 17.66 1.41 1.41" />
          <path d="M2 12h2" />
          <path d="M20 12h2" />
          <path d="m6.34 17.66-1.41 1.41" />
          <path d="m19.07 4.93-1.41 1.41" />
        </svg>
        <svg class="icon moon" viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"
          />
        </svg>
      </button>
    </div>
  </div>
</header>
